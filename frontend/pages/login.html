<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SIGE - Login</title>
    <link
      rel="shortcut icon"
      href="/frontend/img/logo.png"
      type="image/x-icon"
    />
    <script src="https://cdn.tailwindcss.com"></script>
    <style>  
  
      body {
        background-image: url("/frontend/img/image.png");
        background-size: 800px;
        background-position: left;
        background-repeat: no-repeat;
        background-attachment: fixed;
      }
      .glass-effect {
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(10px);
      }
    </style>
    <!-- não precisa ter essa tag style, só se for caso de add alguma imagem de fundo -->
  </head>
  <body class="min-h-screen flex items-center justify-center p-4">
    <div id="app"></div>

    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>

    <script>
      const { createApp, ref, reactive } = Vue;

      createApp({
        setup() {
          const isLogin = ref(true);

          const form = reactive({
            nome: "",
            email: "",
            cpf: "",
            nascimento: "",
            telefone: "",
            senha: "",
            confirmarSenha: "",
          });

          const handleSubmit = () => {
            if (!isLogin.value && form.senha !== form.confirmarSenha) {
              alert("As senhas não conferem!");
              return;
            }

            const acao = isLogin.value ? "Logando..." : "Cadastrando...";
            alert(acao);
            console.log("Dados enviados:", form);
          };

          const toggleMode = () => {
            isLogin.value = !isLogin.value;
            form.senha = "";
            form.confirmarSenha = "";
          };

          return { isLogin, form, handleSubmit, toggleMode };
        },
        template: `
          <div class="glass-effect w-full max-w-[420px] p-10 rounded-[28px] shadow-2xl transition-all duration-500 lg:ml-[80%] md:ml-0">
            
            <h1 class="text-4xl font-bold text-[#0f1480] text-center mb-8">
              {{ isLogin ? 'Login' : 'Cadastro' }}
            </h1>

            <form @submit.prevent="handleSubmit" class="space-y-7 m-4">
              
              <div>
                <input 
                  type="text" 
                  v-model="form.nome" 
                  placeholder="Nome Completo" 
                  class="w-full px-6 py-4 border-2 border-gray-200 rounded-2xl text-base outline-none focus:border-[#2027a8] focus:ring-4 focus:ring-blue-100 transition-all"
                  required 
                />
              </div>

              <div v-if="!isLogin" class="space-y-4">
                <input 
                  type="email" 
                  v-model="form.email" 
                  placeholder="E-mail" 
                  class="w-full px-6 py-4 border-2 border-gray-200 rounded-2xl text-base outline-none focus:border-[#2027a8] focus:ring-4 focus:ring-blue-100 transition-all"
                  required 
                />
                
                <input 
                  type="text" 
                  v-model="form.cpf" 
                  placeholder="CPF (somente números)" 
                  class="w-full px-6 py-4 border-2 border-gray-200 rounded-2xl text-base outline-none focus:border-[#2027a8] focus:ring-4 focus:ring-blue-100 transition-all"
                  required 
                />

                <div class="px-2">
                  <label class="text-xs text-gray-500 block mb-1">Data de Nascimento</label>
                  <input 
                    type="date" 
                    v-model="form.nascimento" 
                    class="w-full px-6 py-4 border-2 border-gray-200 rounded-2xl text-base outline-none focus:border-[#2027a8] focus:ring-4 focus:ring-blue-100 transition-all"
                    required 
                  />
                </div>

                <input 
                  type="tel" 
                  v-model="form.telefone" 
                  placeholder="Telefone (DDD + Número)" 
                  class="w-full px-6 py-4 border-2 border-gray-200 rounded-2xl text-base outline-none focus:border-[#2027a8] focus:ring-4 focus:ring-blue-100 transition-all"
                  required 
                />
              </div>

              <div>
                <input 
                  type="password" 
                  v-model="form.senha" 
                  placeholder="Senha" 
                  class="w-full px-6 py-4 border-2 border-gray-200 rounded-2xl text-base outline-none focus:border-[#2027a8] focus:ring-4 focus:ring-blue-100 transition-all"
                  required 
                />
              </div>

              <div v-if="!isLogin">
                <input 
                  type="password" 
                  v-model="form.confirmarSenha" 
                  placeholder="Confirmar Senha" 
                  class="w-full px-6 py-4 border-2 border-gray-200 rounded-2xl text-base outline-none focus:border-[#2027a8] focus:ring-4 focus:ring-blue-100 transition-all"
                  required 
                />
              </div>

              <button 
                type="submit" 
                class="w-full py-4 bg-[#2027a8] hover:bg-[#0f1480] text-white rounded-2xl text-lg font-semibold transition-all transform hover:-translate-y-1 active:scale-95 mt-4"
              >
                {{ isLogin ? 'Entrar' : 'Criar conta' }}
              </button>

              <div class="text-center mt-6 text-gray-600">
                {{ isLogin ? 'Não tem cadastro?' : 'Já possui conta?' }}
                <a 
                  href="#" 
                  @click.prevent="toggleMode" 
                  class="text-[#2027a8] font-bold hover:underline"
                >
                  {{ isLogin ? 'Cadastrar-se' : 'Fazer login' }}
                </a>
              </div>
            </form>
          </div>
        `,
      }).mount("#app");
    </script>
  </body>
</html>
