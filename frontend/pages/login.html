<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SIGE - Login</title>

    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: "Segoe UI", system-ui, sans-serif;
        min-height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;

        /* A MÁGICA ESTÁ AQUI: Imagem no CSS */
        background-image: url("/frontend/img/image.png");
        background-size: 800px; /* Faz a imagem cobrir a tela toda */
        background-position: left; /* Garante que as luzes da esquerda apareçam */
        background-repeat: no-repeat;
        background-attachment: fixed; /* A imagem não rola com a página */
      }

      /* O CARD DE LOGIN */
      .card {
        width: 100%;
        max-width: 420px;
        background: rgba(
          255,
          255,
          255,
          0.95
        ); /* Branco com leve transparência */
        padding: 50px 40px;
        border-radius: 28px;

        box-shadow: 0 25px 60px rgba(0, 0, 0, 0.4);
        backdrop-filter: blur(10px); /* Efeito de vidro (glassmorphism) */

        /* Posicionando o card um pouco para a direita se quiser 
           deixar as luzes da imagem mais visíveis */
        margin-left: 44%;
      }

      h1 {
        font-size: 2.5rem;
        color: #0f1480;
        margin-bottom: 2rem;
        text-align: center;
        font-weight: 700;
      }

      .field {
        margin-bottom: 1.2rem;
      }

      input {
        width: 100%;
        padding: 1.1rem 1.4rem;
        border: 2px solid #e0e0e0;
        border-radius: 16px;
        font-size: 1rem;
        outline: none;
        transition: 0.3s;
      }

      input:focus {
        border-color: #2027a8;
        box-shadow: 0 0 0 4px rgba(32, 39, 168, 0.1);
      }

      .btn-primary {
        width: 100%;
        padding: 1.1rem;
        background: #2027a8;
        color: white;
        border: none;
        border-radius: 16px;
        font-size: 1.1rem;
        font-weight: 600;
        cursor: pointer;
        transition: 0.3s;
        margin-top: 10px;
      }

      .btn-primary:hover {
        background: #0f1480;
        transform: translateY(-2px);
      }

      .switch-link {
        margin-top: 1.5rem;
        text-align: center;
        color: #555;
      }
      .switch-link a {
        color: #2027a8;
        font-weight: 700;
        text-decoration: none;
      }

      /* Ajuste para telas pequenas */
      @media (max-width: 850px) {
        body {
          background-position: center;
        }
        .card {
          margin-left: 0;
          width: 90%;
        }
      }
    </style>
  </head>
  <body>
    <div id="app"></div>

    <script src="https://cdn.jsdelivr.net/npm/vue@2.7.16/dist/vue.min.js"></script>
    <script>
     new Vue({
        el: "#app",
        data: () => ({
          isLogin: true,
          login: { nome: "", senha: "" },
          cadastro: { 
            nome: "", 
            email: "", 
            cpf: "", 
            nascimento: "", 
            telefone: "", 
            senha: "", 
            confirmarSenha: "" 
          }
        }),
        methods: {
            handleSubmit() {
                if (!this.isLogin && this.cadastro.senha !== this.confirmarSenha) {
                    alert("As senhas não conferem!");
                    return;
                }
                alert(this.isLogin ? "Logando..." : "Cadastrando...");
            }
        },
        template: `
          <div class="card">
              <h1>{{ isLogin ? 'Login' : 'Cadastro' }}</h1>

              <form @submit.prevent="handleSubmit">
                
                <div class="field">
                  <input type="text" v-model="isLogin ? login.nome : cadastro.nome" placeholder="Nome Completo" required />
                </div>

                <template v-if="!isLogin">
                    <div class="field">
                        <input type="email" v-model="cadastro.email" placeholder="E-mail" required />
                    </div>
                    
                    <div class="field">
                        <input type="text" v-model="cadastro.cpf" placeholder="CPF (somente números)" required />
                    </div>

                    <div class="field">
                        <label style="font-size: 0.8rem; color: #666; margin-left: 10px;">Data de Nascimento</label>
                        <input type="date" v-model="cadastro.nascimento" required />
                    </div>

                    <div class="field">
                        <input type="tel" v-model="cadastro.telefone" placeholder="Telefone (DDD + Número)" required />
                    </div>
                </template>

                <div class="field">
                  <input type="password" v-model="isLogin ? login.senha : cadastro.senha" placeholder="Senha" required />
                </div>

                <div v-if="!isLogin" class="field">
                  <input type="password" v-model="cadastro.confirmarSenha" placeholder="Confirmar Senha" required />
                </div>

                <button type="submit" class="btn-primary">
                  {{ isLogin ? 'Entrar' : 'Criar conta' }}
                </button>

                <div class="switch-link">
                  {{ isLogin ? 'Não tem cadastro?' : 'Já possui conta?' }}
                  <a href="#" @click.prevent="isLogin = !isLogin">
                    {{ isLogin ? 'Cadastrar-se' : 'Fazer login' }}
                  </a>
                </div>
              </form>
          </div>
        `,
      });
    </script>
  </body>
</html>
